  <script type="text/babel">
    const PAGE = {"meta":{"title":"Why we'll never sell a subscription","category":"Manifesto","date":"Feb 18, 2026","readTime":"4 min read","lede":"Pay-per-document isn't a pricing experiment, it's a values bet. Here's the math behind it.","author":{"name":"Dana Pham","role":"CEO · co-founder","initials":"DP"},"backHref":"../blog.html","backLabel":"Back to blog"},"sections":[{"body":["Every advisor we talked to in 2024 told us to charge a monthly subscription. Predictable revenue. Recurring billing. Lower CAC payback. It is the SaaS playbook for a reason.","We didn't do it. We sell credit packs. Credits never expire. You buy when you need it; you don't pay when you don't.","Here's why."]},{"h2":"The math","body":["Subscriptions punish the months you don't use them. The user who reads 80 documents in one push for a deal close, and then nothing for three months, pays the same as the user who reads 25 documents every single month.","On a $29/month subscription with 'unlimited reading' bundled, the heavy user wins and the bursty user loses. Most of our customers are bursty.","Pay-per-document inverts this. A $29 Practice pack of 400 documents covers the bursty user for a year. The heavy user buys multiple packs. Both pay for what they actually use."]},{"h2":"The values bet","body":["When you sell a subscription, your incentive is to make it expensive for the user to leave. Locked-in data, slow exports, friction on cancellation.","When you sell credit packs, your incentive is to make the product so good that the user comes back voluntarily. No retention games. No cancellation gauntlets.",{"quote":"If we walked away for two years and came back, our unused credits will still be there. That sentence is the entire pitch.","cite":"Manifesto · principle 01"},"We will never sell a subscription. If you ever see one, we have failed."]}],"related":[{"title":"How Latham redlines MSAs in 10 minutes","tag":"Customer story","href":"latham-case-study.html"},{"title":"Sub-processor changes","tag":"Security","href":"subprocessor-changes.html"},{"title":"Designing for 'I don't know'","tag":"Engineering","href":"designing-for-i-dont-know.html"}]};
