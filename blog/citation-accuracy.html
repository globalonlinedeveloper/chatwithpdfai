  <script type="text/babel">
    const PAGE = {"meta":{"title":"How we got citation accuracy from 91% to 99.6%","category":"Engineering","date":"May 15, 2026","readTime":"12 min read","lede":"Two years of work to make a single number move six percentage points. A deep dive into the retrieval-rerank-ground pipeline that ships in every answer.","author":{"name":"Marcus Yi","role":"CTO · co-founder","initials":"MY"},"backHref":"../blog.html","backLabel":"Back to blog"},"sections":[{"body":["When we shipped the first version of CHATWITHPDFAI in 2024, we measured citation accuracy at 91%. That sounds high until you remember what the other 9% means: a confident-sounding answer that points to the wrong page. For a lawyer or a doctor, that's worse than no answer at all.","Today, our internal eval suite measures **99.6%** on the same set of documents. Here's how we got there."]},{"h2":"What we mean by 'citation accuracy'","id":"definition","body":["A citation is correct when **the cited paragraph actually contains the claim** the answer makes. We don't grade on whether the answer is right — we grade on whether the trail back to the source is honest.","If the answer hallucinates but cites nothing, the citation accuracy is 100% (we said nothing about a source, and there is no source — vacuously honest). The hallucination is a separate metric.","If the answer is right but cites the wrong paragraph, accuracy is 0%. The trail is broken.",{"callout":{"title":"The eval set","body":"1,200 documents across legal, financial, medical, and academic domains. Hand-labeled by a team of three with cross-checks. Refreshed quarterly. Held out from training — the model never sees these documents during fine-tuning."}}]},{"h2":"The naive pipeline (91%)","id":"naive","body":["Our v1 was the textbook RAG approach: chunk the document into 1,000-token segments, embed them, retrieve the top-k for each question, stuff them in the prompt, return the answer with the source chunk IDs.","It worked. Most of the time. The 9% failure modes broke down like this:",{"ul":["**Chunk boundary errors (~3.5%).** The relevant sentence straddled two chunks; we retrieved the wrong one.","**Top-k retrieval misses (~2.5%).** The right chunk wasn't in the top 8 we sent to the model.","**Model attribution drift (~2%).** The model based its answer on chunk A but cited chunk B.","**Page-number errors (~1%).** Our chunk-to-page mapping had off-by-one bugs."]}]},{"h2":"Retrieve · Rerank · Ground","id":"rrg","body":["The new pipeline runs in three stages, each addressing one failure mode.",{"h3":"1. Retrieve (broad)","id":"retrieve"},"We retrieve **48 candidate spans**, not 8. We use hybrid retrieval: dense embeddings + sparse BM25 + a small graph of cross-references for documents that link internally (like SEC filings).","Spans are not fixed-size chunks. They're discovered by a learned sentence-boundary segmenter trained on paragraph-level annotations from law reviews and academic papers. This eliminates ~80% of chunk-boundary errors.",{"h3":"2. Rerank (precise)","id":"rerank"},"We rerank the 48 candidates with a cross-encoder fine-tuned on our eval set. It scores each (question, span) pair jointly. We keep the top 12.","Rerankers are not new. What's new is the loss function: we train against **citation-correctness**, not relevance. A span that's topically related but doesn't contain the answer gets a lower score than a span that contains the exact sentence.",{"h3":"3. Ground (verify)","id":"ground"},"After the model generates an answer with citations, we run a separate **grounding pass**: a small specialist model that, for each claim in the answer, checks whether the cited span actually supports it.","If grounding fails, we don't just drop the citation. We try the next-best candidate from the reranker. If nothing in the top 12 supports the claim, we tell the user we couldn't ground it — calibrated refusal."]},{"h2":"Calibrated refusal","id":"refusal","body":["This was the hardest cultural shift, not the hardest engineering shift. Every product instinct says 'always answer.' Every customer survey says 'I'd rather you tell me you don't know than make something up.'",{"quote":"I'd given up on lit-review tools that hallucinate. This one tells me when the papers conflict and shows me both sides.","cite":"Dr. Hugo P. · Principal Investigator"},"We measure refusal rate the same way we measure citation accuracy: on a held-out set, against ground truth. Our current numbers: 4.1% of questions trigger a refusal. Of those, 96% are 'correct refusals' — the document truly doesn't contain the answer."]},{"h2":"What's next","id":"next","body":["The remaining 0.4% is dominated by two failure modes: (1) table extraction errors in dense financial filings, and (2) very-long multi-hop reasoning across more than three citations.","We've started rolling out a table-aware retriever for v3.3 (currently in dogfood). Multi-hop is harder; the honest answer is we don't fully know how to solve it yet without giving up the latency budget.",{"callout":{"title":"Run the eval yourself","body":"Our eval methodology is open. The eval set is held private to prevent training contamination, but the harness is on GitHub: [github.com/chatwithpdfai/citation-eval](#). We'd love third-party scores on our retriever."}}]}],"related":[{"title":"Designing for 'I don't know'","tag":"Engineering","href":"designing-for-i-dont-know.html"},{"title":"Why we'll never sell a subscription","tag":"Manifesto","href":"no-subscription.html"},{"title":"Our 2026 SOC 2 Type II is signed","tag":"Security","href":"soc-2-2026.html"}]};
    function App() { return <ArticlePage meta={PAGE.meta} sections={PAGE.sections} related={PAGE.related} />; }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
