<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browser extension — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Browser extension">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <PageShell>
          {/* Hero */}
          <section style={{ padding: "60px 0 40px", position: "relative" }}>
            <div className="section-blob" style={{ background: "radial-gradient(circle, var(--violet), transparent 60%)", top: 60, right: -100, opacity: 0.35 }}></div>
            <div className="spread" style={{ position: "relative", zIndex: 2 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 60, alignItems: "center" }} className="ext-hero">
                <div>
                  <span className="pill" style={{ marginBottom: 22, padding: "5px 13px" }}>
                    <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--green)" }}></span>
                    Beta · invite-only
                  </span>
                  <h1 className="display" style={{ fontSize: "clamp(40px, 5vw, 64px)", margin: 0, lineHeight: 0.98 }}>
                    Any PDF, anywhere.<br/>
                    <span className="iris">Chat in one click.</span>
                  </h1>
                  <p style={{ fontSize: 17, color: "var(--text-3)", lineHeight: 1.55, marginTop: 22, maxWidth: 520 }}>
                    Hover over a PDF link, court filing, paper, or contract in any browser. Press the keyboard shortcut — we open it in your workspace with a cited chat already running.
                  </p>
                  <div style={{ marginTop: 28, display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <a href="#" className="btn btn-iris btn-lg">+ Add to Chrome</a>
                    <a href="#" className="btn btn-glass btn-lg">Firefox · Safari · Arc</a>
                  </div>
                  <div className="mono" style={{ fontSize: 11, color: "var(--text-3)", letterSpacing: "0.1em", marginTop: 20, textTransform: "uppercase" }}>
                    ⌘+SHIFT+P · CHAT WITH ANY PDF YOU'RE LOOKING AT
                  </div>
                </div>

                {/* Extension popup mock */}
                <div className="glass glass-iris-border" style={{ padding: 24, borderRadius: "var(--r-xl)", maxWidth: 380, marginLeft: "auto", boxShadow: "var(--shadow-card)" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, paddingBottom: 12, marginBottom: 14, borderBottom: "1px solid var(--stroke-1)" }}>
                    <span className="brand-mark" style={{ width: 22, height: 22, fontSize: 11 }}>◇</span>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>chatwithpdfai</span>
                    <div style={{ flex: 1 }}></div>
                    <span className="mono" style={{ fontSize: 9.5, color: "var(--text-3)", letterSpacing: "0.1em" }}>v3.2.1</span>
                  </div>
                  <div className="mono" style={{ fontSize: 10, color: "var(--text-3)", letterSpacing: "0.1em", marginBottom: 8 }}>PDF DETECTED ON PAGE</div>
                  <div className="glass" style={{ padding: "10px 12px", borderRadius: "var(--r)", marginBottom: 14, display: "flex", gap: 10, alignItems: "center" }}>
                    <div style={{ width: 32, height: 40, background: "rgba(255,255,255,0.04)", border: "1px solid var(--stroke-2)", borderRadius: 3, display: "flex", alignItems: "center", justifyContent: "center" }}><span className="mono" style={{ fontSize: 9, color: "var(--text-3)" }}>PDF</span></div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>NVDA-Q3-2026-10Q.pdf</div>
                      <div className="mono" style={{ fontSize: 9.5, color: "var(--text-3)", letterSpacing: "0.06em" }}>89 PP · 6.2 MB</div>
                    </div>
                  </div>
                  <button className="btn btn-iris" style={{ width: "100%", justifyContent: "center" }}>Open in workspace →</button>
                  <div style={{ marginTop: 12, padding: "8px 10px", background: "var(--glass-2)", borderRadius: 6, fontSize: 11.5, color: "var(--text-3)", textAlign: "center" }}>
                    Or paste a URL → <span className="mono">⌘V</span>
                  </div>
                  <div style={{ marginTop: 12, display: "flex", gap: 8, fontSize: 11 }}>
                    {["Quick-summary", "Cite-page mode", "Send to folder"].map(c => <div key={c} className="chip" style={{ fontSize: 10.5, padding: "3px 8px" }}>{c}</div>)}
                  </div>
                </div>
              </div>
              <style>{`@media (max-width: 880px) { .ext-hero { grid-template-columns: 1fr !important; } }`}</style>
            </div>
          </section>

          {/* Features */}
          <section style={{ padding: "40px 0 80px" }}>
            <div className="spread">
              <div className="section-eyebrow">What it does</div>
              <h2 className="section-title" style={{ fontSize: 34, margin: "12px 0 28px" }}>Three uses, <span className="iris">one shortcut.</span></h2>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14 }} className="ext-feats">
                {[
                  { t: "Quick-summary", d: "Hover over a PDF link → press shortcut → get a 3-bullet summary as a popup. Useful before deciding whether to open the full doc.", icon: "§" },
                  { t: "Open in workspace", d: "Click the toolbar icon to send any PDF you're viewing to your workspace, with auto-summary and suggested questions ready.", icon: "↗" },
                  { t: "Highlight → cite", d: "Highlight any text on a page → context menu lets you ask 'find related quotes in my library' across all your uploaded documents.", icon: "✓" },
                ].map(f => (
                  <div key={f.t} className="glass hover-glow" style={{ padding: "26px 24px", borderRadius: "var(--r-xl)" }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: "var(--glass-2)", border: "1px solid var(--stroke-2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, color: "var(--violet-2)", marginBottom: 14 }}>{f.icon}</div>
                    <h3 style={{ fontSize: 17, fontWeight: 600, margin: "0 0 6px" }}>{f.t}</h3>
                    <p style={{ margin: 0, fontSize: 13.5, color: "var(--text-3)", lineHeight: 1.55 }}>{f.d}</p>
                  </div>
                ))}
              </div>
              <style>{`@media (max-width: 760px) { .ext-feats { grid-template-columns: 1fr !important; } }`}</style>
            </div>
          </section>

          {/* Privacy callout */}
          <section style={{ padding: "20px 0 80px" }}>
            <div className="spread">
              <div className="glass" style={{ padding: "28px 32px", borderRadius: "var(--r-xl)", display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap" }}>
                <div style={{ flex: "0 0 auto", width: 60, height: 60, borderRadius: 14, background: "rgba(126,255,157,0.12)", border: "1px solid rgba(126,255,157,0.4)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, color: "var(--green)" }}>🔒</div>
                <div style={{ flex: 1, minWidth: 280 }}>
                  <h3 style={{ fontSize: 17, fontWeight: 600, margin: "0 0 6px" }}>What the extension can and can't see</h3>
                  <p style={{ fontSize: 13, color: "var(--text-3)", margin: 0, lineHeight: 1.55 }}>
                    The extension only activates on tabs you click the button on. It never reads your browsing history, your other tabs, or any page you don't explicitly hand to it. We publish the source on{" "}
                    <a href="#" style={{ color: "var(--violet-2)", textDecoration: "underline" }}>GitHub</a> for audit.
                  </p>
                </div>
              </div>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
