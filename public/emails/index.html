<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email templates — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../a11y.css" />
  <link rel="stylesheet" href="../prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Email templates">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="../chrome.jsx"></script>
  <script type="text/babel">
    const EMAILS = [
      { slug: "welcome", title: "Welcome", desc: "First email after sign-up. 3 free docs reminder + first-action CTAs." },
      { slug: "receipt", title: "Payment receipt", desc: "After Stripe payment confirms. Receipt + credit balance + workspace link." },
      { slug: "reset", title: "Password reset", desc: "Reset link, IP/UA stamp, 1-hour expiry, security warning." },
      { slug: "deletion", title: "Account deletion receipt", desc: "GDPR-compliant deletion confirmation. Timestamps + request ID." },
      { slug: "digest", title: "Weekly digest", desc: "Opt-in weekly recap. Docs read, questions asked, time saved, new features." },
    ];
    function App() {
      return (
        <PageShell>
          <PageHeader eyebrow="Internal · Email templates" title={<>Transactional <span className="iris">email templates.</span></>} lede="Five HTML emails the system sends. Tested in Gmail, Outlook, Apple Mail, mobile. Inline CSS, table-based layout, dark mode aware." />
          <section style={{ padding: "0 0 100px" }}>
            <div className="spread">
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 14 }} className="email-grid">
                {EMAILS.map(e => (
                  <a key={e.slug} href={`${e.slug}.html`} target="_blank" className="glass hover-glow" style={{ padding: 0, borderRadius: "var(--r-xl)", overflow: "hidden", display: "flex", flexDirection: "column" }}>
                    <div style={{ aspectRatio: "1.6", background: "linear-gradient(135deg, rgba(183,106,255,0.12), rgba(78,163,255,0.08))", padding: 20, position: "relative", borderBottom: "1px solid var(--stroke-1)" }}>
                      <div style={{ position: "absolute", inset: 16, background: "linear-gradient(180deg, rgba(10,12,32,0.95), rgba(17,20,46,0.95))", borderRadius: 10, padding: 14, border: "1px solid rgba(255,255,255,0.1)" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 14 }}>
                          <div style={{ width: 14, height: 14, borderRadius: 4, background: "var(--grad-iris-2)" }}></div>
                          <div className="mono" style={{ fontSize: 8.5, color: "rgba(255,255,255,0.6)", letterSpacing: "0.08em" }}>chatwithpdfai.com</div>
                        </div>
                        <div className="mono" style={{ fontSize: 7.5, letterSpacing: "0.18em", color: "var(--violet-2)", marginBottom: 6, textTransform: "uppercase" }}>{e.title.toUpperCase()}</div>
                        <div style={{ width: "85%", height: 8, borderRadius: 2, background: "rgba(255,255,255,0.18)", marginBottom: 4 }}></div>
                        <div style={{ width: "70%", height: 8, borderRadius: 2, background: "rgba(255,255,255,0.12)", marginBottom: 10 }}></div>
                        <div style={{ width: "50%", height: 12, borderRadius: 6, background: "var(--grad-iris-2)" }}></div>
                      </div>
                    </div>
                    <div style={{ padding: "18px 22px" }}>
                      <h3 style={{ fontSize: 16, fontWeight: 600, margin: "0 0 4px" }}>{e.title}</h3>
                      <p style={{ fontSize: 12.5, color: "var(--text-3)", margin: 0, lineHeight: 1.5 }}>{e.desc}</p>
                      <div className="mono" style={{ fontSize: 10, color: "var(--violet-2)", letterSpacing: "0.12em", marginTop: 12 }}>OPEN PREVIEW →</div>
                    </div>
                  </a>
                ))}
              </div>
              <style>{`@media (max-width: 760px) { .email-grid { grid-template-columns: 1fr !important; } }`}</style>

              <div className="glass" style={{ marginTop: 32, padding: "22px 26px", borderRadius: "var(--r-lg)" }}>
                <div className="eyebrow" style={{ marginBottom: 10 }}>Template variables</div>
                <p style={{ fontSize: 13.5, color: "var(--text-3)", margin: "0 0 14px", lineHeight: 1.55 }}>All templates use mustache-style placeholders that are substituted server-side before sending:</p>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8 }}>
                  {["{{first_name}}", "{{email}}", "{{ip}}", "{{location}}", "{{user_agent}}", "{{reset_url}}", "{{receipt_id}}", "{{pack_name}}", "{{credits_added}}", "{{doc_count}}", "{{subtotal}}", "{{tax}}", "{{total}}", "{{date}}", "{{deletion_date}}", "{{backup_purge_date}}", "{{request_id}}", "{{document_count}}", "{{week_start}}", "{{docs_read}}", "{{questions_asked}}", "{{time_saved}}", "{{top_doc_name}}", "{{top_doc_chats}}", "{{top_doc_pages}}", "{{unsubscribe_url}}"].map(v => (
                    <code key={v} style={{ fontSize: 11, padding: "5px 8px", background: "var(--glass-2)", border: "1px solid var(--stroke-2)", borderRadius: 4, color: "var(--violet-2)" }}>{v}</code>
                  ))}
                </div>
              </div>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
