<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/><title>Library · CHATWITHPDFAI (internal)</title>
<style>
:root{--ink:#15192b;--muted:#5b637d;--line:#e4e7f0;--brand:#3b5bdb;--ok:#0f9d58;--bad:#d23f3f;--bg:#f7f8fc}
*{box-sizing:border-box}body{margin:0;font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}
.wrap{max-width:820px;margin:0 auto;padding:40px 20px}h1{font-size:24px;margin:0 0 4px}.sub{color:var(--muted);margin:0 0 22px;font-size:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px 18px}
table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line)}th{color:var(--muted);font-weight:600}
.pill{font-size:12px;padding:2px 8px;border-radius:999px;background:#eef1fb;color:var(--brand)}.pill.ready{background:#e9f7ef;color:var(--ok)}.pill.failed{background:#fdeaea;color:var(--bad)}
.bar{display:flex;gap:12px;align-items:center;margin:18px 0}
button{font:inherit;font-weight:600;color:#fff;background:var(--brand);border:0;border-radius:10px;padding:10px 18px;cursor:pointer}button:disabled{opacity:.5;cursor:not-allowed}
a.btn{display:inline-block;text-decoration:none}.empty{color:var(--muted);padding:16px 8px}.muted{color:var(--muted);font-size:13px}
</style></head><body>
<div class="wrap">
  <h1>Your library</h1>
  <p class="sub">Select one or more documents and chat across them. (Internal harness, feature-flagged.)</p>
  <div class="bar">
    <button type="button" data-testid="chat-selected-btn" disabled>Chat with selected</button>
    <span class="muted" data-testid="sel-count">0 selected</span>
    <a class="muted" href="/upload.html" style="margin-left:auto">+ Upload a PDF</a>
  </div>
  <div class="card"><div data-testid="doc-list"><p class="empty" data-testid="doc-empty">Loading…</p></div></div>
</div>
<script>
(function(){
  var listEl=document.querySelector('[data-testid="doc-list"]');
  var btn=document.querySelector('[data-testid="chat-selected-btn"]');
  var count=document.querySelector('[data-testid="sel-count"]');
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]});}
  function selected(){return Array.prototype.slice.call(document.querySelectorAll('[data-testid="doc-check"]:checked')).map(function(c){return c.value});}
  function refreshBar(){var s=selected();count.textContent=s.length+' selected';btn.disabled=s.length===0;}
  function render(docs){
    if(!docs||!docs.length){listEl.innerHTML='<p class="empty" data-testid="doc-empty">No documents yet. Upload one to begin.</p>';return;}
    var rows=docs.map(function(d){var cls=d.status==='ready'?'ready':(d.status==='failed'?'failed':'');
      return '<tr data-testid="doc-row"><td><input type="checkbox" data-testid="doc-check" value="'+d.id+'"'+(d.status==='ready'?'':' disabled')+'></td>'+
      '<td>'+esc(d.filename)+'</td><td><span class="pill '+cls+'">'+esc(d.status)+'</span></td><td>'+(d.pageCount||0)+'</td></tr>';}).join('');
    listEl.innerHTML='<table><thead><tr><th></th><th>File</th><th>Status</th><th>Pages</th></tr></thead><tbody>'+rows+'</tbody></table>';
    Array.prototype.forEach.call(document.querySelectorAll('[data-testid="doc-check"]'),function(c){c.addEventListener('change',refreshBar)});
  }
  btn.addEventListener('click',function(){var s=selected();if(s.length)location.href='/chat?docs='+s.join(',');});
  fetch('/api/documents').then(function(r){return r.ok?r.json():{documents:[]}}).then(function(j){render(j.documents);refreshBar();}).catch(function(){listEl.innerHTML='<p class="empty">Could not load.</p>';});
})();
</script></body></html>
