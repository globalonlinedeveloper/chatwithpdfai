<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex, nofollow"/><title>Chat with your PDFs · CHATWITHPDFAI (internal)</title>
<style>
:root{--ink:#15192b;--muted:#5b637d;--line:#e4e7f0;--brand:#3b5bdb;--ok:#0f9d58;--bad:#d23f3f;--bg:#f7f8fc}
*{box-sizing:border-box}body{margin:0;font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}
.wrap{max-width:760px;margin:0 auto;padding:40px 20px}h1{font-size:24px;margin:0 0 4px}.sub{color:var(--muted);margin:0 0 22px;font-size:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
input,textarea{width:100%;font:inherit;border:1px solid var(--line);border-radius:10px;padding:10px 12px}textarea{min-height:72px;resize:vertical}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}
button{font:inherit;font-weight:600;color:#fff;background:var(--brand);border:0;border-radius:10px;padding:11px 18px;cursor:pointer}
button.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand)}button:disabled{opacity:.5;cursor:not-allowed}
.answer{white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;min-height:24px}
.meta{margin-top:10px;font-size:13px;color:var(--muted)}.pill{display:inline-block;font-size:12px;padding:2px 9px;border-radius:999px;background:#eef1fb;color:var(--brand);margin:0 6px 6px 0}.bad{color:var(--bad)}
</style></head><body>
<div class="wrap">
  <h1>Chat with your PDFs</h1>
  <p class="sub">Ask across one or more documents. Answers cite source pages; routed to the cheapest capable model.</p>
  <div class="card">
    <label for="doc">Document ID(s) — comma-separated for multi-PDF</label>
    <input id="doc" data-testid="doc-id" placeholder="e.g. 12  or  12,15"/>
    <label for="q" style="margin-top:14px">Question</label>
    <textarea id="q" data-testid="question" placeholder="What is the invoice total?"></textarea>
    <div class="row">
      <button type="button" data-testid="ask-btn">Ask</button>
      <button type="button" class="ghost" data-testid="estimate-btn">Estimate cost</button>
      <span class="meta" data-testid="estimate"></span>
      <span class="meta" data-testid="ask-meta"></span>
    </div>
  </div>
  <div class="answer" data-testid="answer">Ask a question to get a cited answer.</div>
  <div class="meta"><span data-testid="citations"></span></div>
  <div class="meta" data-testid="sources"></div>
</div>
<script>
(function(){
  var docEl=document.querySelector('[data-testid="doc-id"]'),qEl=document.querySelector('[data-testid="question"]');
  var ask=document.querySelector('[data-testid="ask-btn"]'),estBtn=document.querySelector('[data-testid="estimate-btn"]');
  var ans=document.querySelector('[data-testid="answer"]'),cite=document.querySelector('[data-testid="citations"]');
  var est=document.querySelector('[data-testid="estimate"]'),meta=document.querySelector('[data-testid="ask-meta"]'),srcEl=document.querySelector('[data-testid="sources"]');
  var p=new URLSearchParams(location.search);
  if(p.get('docs'))docEl.value=p.get('docs');else if(p.get('doc'))docEl.value=p.get('doc');
  function ids(){return docEl.value.split(',').map(function(s){return Number(s.trim())}).filter(function(n){return n>0});}
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]});}
  estBtn.addEventListener('click',function(){
    var documentIds=ids(),message=(qEl.value||'').trim();
    if(!documentIds.length||!message){est.textContent='Enter doc ID(s) + a question.';return;}
    est.textContent='Estimating…';
    fetch('/api/chat/estimate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({documentIds:documentIds,message:message})})
      .then(function(r){return r.json()}).then(function(j){est.textContent=j.estimatedCredits!=null?('~'+j.estimatedCredits+' credit'+(j.estimatedCredits===1?'':'s')+' (₹'+j.estimatedCostInr+')'):('Error: '+(j.error||'?'));})
      .catch(function(e){est.textContent='Error: '+e.message;});
  });
  ask.addEventListener('click',function(){
    var documentIds=ids(),message=(qEl.value||'').trim();
    if(!documentIds.length){ans.className='answer bad';ans.textContent='Enter document ID(s) first.';return;}
    if(!message){ans.className='answer bad';ans.textContent='Type a question first.';return;}
    ask.disabled=true;meta.textContent='Thinking…';ans.className='answer';ans.textContent='…';cite.textContent='';srcEl.textContent='';
    fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({documentIds:documentIds,message:message})})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,body:j}})})
      .then(function(res){
        if(!res.ok){ans.className='answer bad';ans.textContent='Error: '+(res.body.error||'chat failed');return;}
        var b=res.body;ans.className='answer';ans.textContent=b.answer;
        var bits=[];
        if(b.citations&&b.citations.length)bits.push('<span class="pill" data-testid="cite-pages">Pages: '+b.citations.join(', ')+'</span>');
        bits.push('<span class="pill" data-testid="cite-provider">'+(b.provider||'?')+(b.model?' · '+b.model:'')+'</span>');
        if(typeof b.credits==='number')bits.push('<span class="pill">'+b.credits+' credit'+(b.credits===1?'':'s')+'</span>');
        if(b.cached)bits.push('<span class="pill">cached</span>');
        cite.innerHTML=bits.join(' ');
        if(b.sources&&b.sources.length){var uniq={};b.sources.forEach(function(s){uniq[s.filename+' p.'+s.page]=1;});srcEl.innerHTML='Sources: '+esc(Object.keys(uniq).join('  ·  '));}
      })
      .catch(function(e){ans.className='answer bad';ans.textContent='Error: '+e.message;})
      .finally(function(){ask.disabled=false;meta.textContent='';});
  });
})();
</script></body></html>
