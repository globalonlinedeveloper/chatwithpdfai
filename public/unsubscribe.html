<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unsubscribe — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Unsubscribe">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [prefs, setPrefs] = useState({ digest: false, product: true, transactional: true });
      const [saved, setSaved] = useState(false);
      const [allOff, setAllOff] = useState(false);
      const save = () => { setSaved(true); window.cwpaToast?.({ kind: "success", title: "Preferences saved" }); };
      const off = () => { setPrefs({ digest: false, product: false, transactional: true }); setAllOff(true); setSaved(true); window.cwpaToast?.({ kind: "info", title: "You're unsubscribed from marketing emails" }); };
      return (
        <PageShell minimalFooter>
          <section style={{ minHeight: "70vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "60px 24px" }}>
            <div className="glass glass-iris-border" style={{ maxWidth: 520, width: "100%", padding: 36, borderRadius: "var(--r-xl)", boxShadow: "var(--shadow-card)" }}>
              <div className="section-eyebrow">Email preferences</div>
              <h1 style={{ fontSize: 28, fontWeight: 600, margin: "14px 0 8px", letterSpacing: "-0.02em" }}>
                {saved && allOff ? <>You're <span className="iris">unsubscribed.</span></> : saved ? <>Saved.</> : <>Manage your <span className="iris">emails.</span></>}
              </h1>
              <p style={{ fontSize: 14, color: "var(--text-3)", margin: "0 0 22px", lineHeight: 1.55 }}>
                {saved && allOff ? <>You won't get marketing emails from us anymore. We'll still send transactional emails (receipts, password resets, security alerts) — these can't be turned off while your account is active.</> : <>maya@arkhamcapital.com — choose which CHATWITHPDFAI emails you'd like to receive.</>}
              </p>

              {!saved && (
                <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 22 }}>
                  {[
                    { k: "digest", l: "Weekly digest", d: "Documents read, questions asked, time saved — every Monday." },
                    { k: "product", l: "Product updates", d: "New features, major releases. ~2x per month." },
                    { k: "transactional", l: "Transactional", d: "Receipts, password resets, security alerts. Can't be disabled.", locked: true },
                  ].map(o => (
                    <label key={o.k} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 14, padding: "14px 16px", border: "1px solid var(--stroke-2)", borderRadius: "var(--r)", cursor: o.locked ? "default" : "pointer", opacity: o.locked ? 0.7 : 1 }}>
                      <div>
                        <div style={{ fontSize: 13.5, fontWeight: 600 }}>{o.l}</div>
                        <div style={{ fontSize: 12, color: "var(--text-3)", marginTop: 2 }}>{o.d}</div>
                      </div>
                      <input type="checkbox" checked={prefs[o.k]} disabled={o.locked} onChange={e => setPrefs({ ...prefs, [o.k]: e.target.checked })} style={{ marginTop: 4 }} />
                    </label>
                  ))}
                </div>
              )}

              {saved ? (
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                  <a href="account.html" className="btn btn-iris" style={{ flex: 1, justifyContent: "center" }}>Open account settings →</a>
                  <a href="landing.html" className="btn btn-glass" style={{ flex: 1, justifyContent: "center" }}>Back to landing</a>
                </div>
              ) : (
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={save} className="btn btn-iris" style={{ flex: 1, justifyContent: "center" }}>Save preferences</button>
                  <button onClick={off} className="btn btn-glass">Unsubscribe from all</button>
                </div>
              )}

              <div style={{ marginTop: 20, paddingTop: 16, borderTop: "1px solid var(--stroke-1)", fontSize: 11.5, color: "var(--text-4)", lineHeight: 1.5 }}>
                Need to delete your account entirely? Use <a href="account.html" style={{ color: "var(--text-3)", textDecoration: "underline" }}>Account → Danger zone</a> for a full delete. Or email <a href="mailto:privacy@chatwithpdfai.com" style={{ color: "var(--text-3)", textDecoration: "underline" }}>privacy@chatwithpdfai.com</a>.
              </div>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
