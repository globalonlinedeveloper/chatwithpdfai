  <script type="text/babel">
    const PAGE = {"meta":{"title":"Designing for 'I don't know'","category":"Engineering","date":"Mar 21, 2026","readTime":"11 min read","lede":"Why every LLM product needs a calibrated refusal — and how we built ours so that the model would rather pass than hallucinate.","author":{"name":"Marcus Yi","role":"CTO · co-founder","initials":"MY"},"backHref":"../blog.html","backLabel":"Back to blog"},"sections":[{"body":["The most underrated feature in any LLM product is the ability to say 'I don't know.' It is also the hardest one to ship, because every product instinct fights it."]},{"h2":"Why models confabulate","body":["Large language models are trained on next-token prediction. Saying 'I don't know' is a low-probability completion compared to plausible-sounding text. Without explicit signal, the model will always prefer fluency over honesty."]},{"h2":"Three layers of refusal","body":[{"ol":["**Pre-grounding refusal.** Before we even let the model answer, we check whether the retrieved spans plausibly contain the answer. If not, the model is instructed to refuse.","**Post-grounding refusal.** After the model generates a citation, our grounding model verifies the citation. If verification fails on every retrieval, refuse.","**Confidence-calibrated softening.** Even when we have an answer, if the confidence is below 0.7, we hedge: \"Based on the document, it appears that...\" instead of asserting."]}]},{"h2":"Cultural costs","body":["The first time we shipped calibrated refusal, customer support complaints went up. People said \"why isn't it answering my question?\" Then the customers who needed honesty (lawyers, doctors, researchers) started showing up in droves.",{"quote":"Finally a research tool that says 'I don't know' instead of inventing a paper.","cite":"Dr. Hugo P."},"Refusal is a feature. We optimize for it. We measure it weekly."]}],"related":[{"title":"How we got citation accuracy to 99.6%","tag":"Engineering","href":"citation-accuracy.html"},{"title":"Why we'll never sell a subscription","tag":"Manifesto","href":"no-subscription.html"},{"title":"OCR that actually works","tag":"Product","href":"ocr-bad-scans.html"}]};
