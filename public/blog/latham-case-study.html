20","MSAs / quarter"]]}]},{"h2":"What about the bills?","body":["Two things. First: on the Chamber plan, 2,500 documents cost $119. Second: associate time at biglaw billing rates is far more expensive than the credits. The partners care about throughput and quality. Both went up.",{"callout":{"title":"Try the workflow","body":"Daniel's team uses the Chamber plan with SSO and audit logs. Email sales@chatwithpdfai.com to discuss enterprise pricing."}}]}],"related":[{"title":"Multi-PDF chat across folders","tag":"Product","href":"multi-pdf-chat.html"},{"title":"How we got citation accuracy to 99.6%","tag":"Engineering","href":"citation-accuracy.html"},{"title":"Our 2026 SOC 2 Type II is signed","tag":"Security","href":"soc-2-2026.html"}]};
