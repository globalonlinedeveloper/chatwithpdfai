king. The marketing site uses self-hosted PostHog for product analytics; the app uses none.","We do not sell, rent, or share customer data with anyone outside this list."]}],"related":[{"title":"Our 2026 SOC 2 Type II is signed","tag":"Security","href":"soc-2-2026.html"},{"title":"Why we'll never sell a subscription","tag":"Manifesto","href":"no-subscription.html"},{"title":"How we got citation accuracy to 99.6%","tag":"Engineering","href":"citation-accuracy.html"}]};
