<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help center — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../a11y.css" />
  <link rel="stylesheet" href="../prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Help center">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="../chrome.jsx"></script>
  <script type="text/babel">
    const CATS = [
      { name: "Basics", icon: "◇", desc: "Sign up, upload, ask your first question", articles: [
        { t: "Getting started", h: "getting-started.html", min: 4 },
        { t: "Workspace tour", h: "getting-started.html", min: 3 },
        { t: "Sample documents", h: "getting-started.html", min: 2 },
      ]},
      { name: "Features", icon: "≡", desc: "Multi-PDF chat, citations, exports", articles: [
        { t: "Multi-PDF chat", h: "multi-pdf-chat.html", min: 6 },
        { t: "Understanding citations", h: "citations.html", min: 4 },
        { t: "Exporting your chat", h: "export.html", min: 3 },
        { t: "Folders & organization", h: "getting-started.html", min: 3 },
        { t: "Sharing a chat", h: "export.html", min: 2 },
      ]},
      { name: "Billing", icon: "◉", desc: "Credits, packs, refunds, receipts", articles: [
        { t: "Credits & billing", h: "credits.html", min: 5 },
        { t: "Refund policy", h: "credits.html", min: 2 },
        { t: "Team & seats", h: "credits.html", min: 3 },
      ]},
      { name: "Privacy & security", icon: "⊕", desc: "What we store, how, and why", articles: [
        { t: "Privacy basics", h: "privacy.html", min: 5 },
        { t: "Deleting your data", h: "privacy.html", min: 2 },
        { t: "GDPR / CCPA rights", h: "privacy.html", min: 3 },
        { t: "HIPAA / BAA", h: "privacy.html", min: 4 },
      ]},
      { name: "Integrations", icon: "↔", desc: "Drive, Notion, Anki, API", articles: [
        { t: "Google Drive", h: "export.html", min: 3 },
        { t: "Notion export", h: "export.html", min: 2 },
        { t: "Anki flashcards", h: "export.html", min: 3 },
        { t: "Webhooks", h: "../docs.html", min: 5 },
      ]},
      { name: "Troubleshooting", icon: "⌖", desc: "What to do when something breaks", articles: [
        { t: "Upload failed", h: "getting-started.html", min: 3 },
        { t: "OCR took too long", h: "getting-started.html", min: 2 },
        { t: "Citation says 'unverified'", h: "citations.html", min: 3 },
        { t: "Login problems", h: "privacy.html", min: 2 },
      ]},
    ];

    function App() {
      const [q, setQ] = React.useState("");
      const filtered = q ? CATS.map(c => ({ ...c, articles: c.articles.filter(a => a.t.toLowerCase().includes(q.toLowerCase())) })).filter(c => c.articles.length > 0) : CATS;
      return (
        <PageShell active="help">
          <section style={{ padding: "60px 0 20px", position: "relative" }}>
            <div className="section-blob" style={{ background: "radial-gradient(circle, var(--violet), transparent 60%)", top: -50, left: "30%", opacity: 0.35 }}></div>
            <div className="spread" style={{ textAlign: "center", position: "relative", zIndex: 2 }}>
              <div className="section-eyebrow" style={{ justifyContent: "center" }}>Help center</div>
              <h1 className="section-title" style={{ fontSize: "clamp(36px, 5vw, 56px)", margin: "16px auto 14px", maxWidth: 800 }}>
                How can we <span className="iris">help?</span>
              </h1>
              <p className="section-lede" style={{ margin: "0 auto 30px", maxWidth: 560 }}>
                Browse articles below, or search. Still stuck? <a href="../contact.html" style={{ color: "var(--violet-2)", textDecoration: "underline" }}>Email support</a> — 4-hour reply SLA.
              </p>
              <div className="glass" style={{ padding: 8, borderRadius: "var(--r-pill)", display: "flex", gap: 8, maxWidth: 540, margin: "0 auto", alignItems: "center" }}>
                <span style={{ fontSize: 16, paddingLeft: 14, color: "var(--text-3)" }}>⌕</span>
                <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search the help center…" style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "var(--text)", fontSize: 14, padding: "10px 0" }} />
                <button onClick={() => setQ("")} className="btn btn-glass btn-sm" style={{ visibility: q ? "visible" : "hidden" }}>Clear</button>
              </div>
            </div>
          </section>

          <section style={{ padding: "30px 0 60px" }}>
            <div className="spread">
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16 }} className="help-grid">
                {filtered.map(c => (
                  <div key={c.name} className="glass hover-glow" style={{ padding: "26px 28px", borderRadius: "var(--r-xl)" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                      <div style={{ width: 36, height: 36, borderRadius: 10, background: "var(--glass-2)", border: "1px solid var(--stroke-2)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--violet-2)", fontSize: 16 }}>{c.icon}</div>
                      <div>
                        <h3 style={{ fontSize: 17, fontWeight: 600, margin: 0 }}>{c.name}</h3>
                        <p style={{ fontSize: 12, color: "var(--text-3)", margin: 0 }}>{c.desc}</p>
                      </div>
                    </div>
                    <ul style={{ listStyle: "none", padding: 0, margin: 0 }}>
                      {c.articles.map(a => (
                        <li key={a.t} style={{ borderTop: "1px solid var(--stroke-1)" }}>
                          <a href={a.h} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", color: "var(--text-2)", fontSize: 13.5 }}>
                            <span>{a.t}</span>
                            <span className="mono" style={{ fontSize: 10, color: "var(--text-4)", letterSpacing: "0.08em" }}>{a.min} MIN</span>
                          </a>
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
              <style>{`@media (max-width: 760px) { .help-grid { grid-template-columns: 1fr !important; } }`}</style>

              {/* Contact CTA */}
              <div className="glass glass-iris-border" style={{ marginTop: 32, padding: "28px 32px", borderRadius: "var(--r-xl)", textAlign: "center" }}>
                <div className="eyebrow" style={{ marginBottom: 10 }}>Still stuck?</div>
                <h3 style={{ fontSize: 22, fontWeight: 600, margin: "0 0 8px", letterSpacing: "-0.02em" }}>Talk to a human — 4-hour SLA.</h3>
                <p style={{ fontSize: 13.5, color: "var(--text-3)", margin: "0 0 18px" }}>No support bots, no maze. Email support@chatwithpdfai.com.</p>
                <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
                  <a href="../contact.html" className="btn btn-iris">Contact support →</a>
                  <a href="../status.html" className="btn btn-glass">Status page</a>
                </div>
              </div>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
