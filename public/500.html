<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Something went wrong — CHATWITHPDFAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="500">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    function App() {
      const traceId = "req_" + Math.random().toString(36).slice(2, 14);
      return (
        <PageShell>
          <section style={{ minHeight: "70vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "80px 24px" }}>
            <div className="section-blob" style={{ background: "radial-gradient(circle, var(--pink), transparent 60%)", top: "20%", right: "20%", opacity: 0.4 }}></div>
            <div style={{ textAlign: "center", maxWidth: 560, position: "relative", zIndex: 2 }}>
              <div className="mono" style={{ fontSize: 11, color: "#ff7e7e", letterSpacing: "0.16em", marginBottom: 12, textTransform: "uppercase" }}>Error · 500 · Internal</div>
              <h1 className="display" style={{ fontSize: "clamp(60px, 10vw, 110px)", margin: "8px 0", lineHeight: 0.9 }}>
                Something broke<br/><span className="iris">on our side.</span>
              </h1>
              <p style={{ fontSize: 15, color: "var(--text-3)", lineHeight: 1.6, margin: "20px 0 24px" }}>
                We've been paged and we're looking into it. Your data is safe — anything you'd already saved is fine. Try refreshing in a minute.
              </p>
              <div className="glass" style={{ padding: 14, borderRadius: "var(--r)", display: "inline-flex", gap: 10, alignItems: "center", marginBottom: 28 }}>
                <span className="mono" style={{ fontSize: 11, color: "var(--text-3)", letterSpacing: "0.06em" }}>TRACE ID</span>
                <span className="mono" style={{ fontSize: 12, color: "var(--text)", fontWeight: 600 }}>{traceId}</span>
                <button onClick={() => navigator.clipboard?.writeText(traceId)} className="btn btn-ghost btn-sm" style={{ padding: "3px 8px" }}>Copy</button>
              </div>
              <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
                <button onClick={() => location.reload()} className="btn btn-iris">↻ Try again</button>
                <a href="status.html" className="btn btn-glass">Status page</a>
                <a href="contact.html" className="btn btn-ghost">Contact support</a>
              </div>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
