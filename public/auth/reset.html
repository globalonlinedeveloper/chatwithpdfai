<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set a new password — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../a11y.css" />
  <link rel="stylesheet" href="../prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Reset password">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    function strengthOf(p) {
      let s = 0;
      if (p.length >= 12) s++;
      if (p.length >= 16) s++;
      if (/[0-9]/.test(p)) s++;
      if (/[A-Z]/.test(p)) s++;
      if (/[^A-Za-z0-9]/.test(p)) s++;
      return s; // 0-5
    }
    const LABELS = ["", "Very weak", "Weak", "OK", "Strong", "Excellent"];
    const COLORS = ["", "#ff7e7e", "#ff8888", "#ffbd2e", "var(--green)", "var(--green)"];

    function App() {
      const [pw, setPw] = useState("");
      const [pw2, setPw2] = useState("");
      const [done, setDone] = useState(false);
      const s = strengthOf(pw);
      const match = pw && pw === pw2;
      const valid = s >= 3 && match;

      if (done) {
        return (
          <AuthShell title="Password updated." lede="You can sign in with the new one." footer={<a href="signin.html" style={{ color: "var(--violet-2)" }}>Sign in →</a>}>
            <div style={{ padding: "20px 0", textAlign: "center" }}>
              <div style={{ width: 64, height: 64, borderRadius: 16, background: "var(--grad-iris-2)", margin: "0 auto 18px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, color: "#fff", boxShadow: "0 10px 28px -8px oklch(0.55 0.22 290 / 0.6)" }}>✓</div>
              <p style={{ fontSize: 13.5, color: "var(--text-3)", margin: 0, lineHeight: 1.55 }}>For your safety, you've been signed out of all other sessions. We've also emailed a security receipt to your inbox.</p>
              <a href="signin.html" className="btn btn-iris" style={{ marginTop: 20, width: "100%", justifyContent: "center" }}>Sign in →</a>
            </div>
          </AuthShell>
        );
      }

      return (
        <AuthShell title="Set a new password." lede="Pick something at least 12 characters. We'll sign you out of other sessions automatically." footer={<a href="signin.html" style={{ color: "var(--violet-2)" }}>← Back to sign in</a>}>
          <form onSubmit={e => { e.preventDefault(); if (valid) setDone(true); }} style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <label>
              <div className="eyebrow" style={{ marginBottom: 6 }}>New password</div>
              <input className="input" type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="At least 12 characters" minLength={12} required autoFocus />
              {pw && (
                <>
                  <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
                    {[1, 2, 3, 4, 5].map(i => (
                      <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i <= s ? COLORS[s] : "var(--glass-2)", transition: "background .15s" }}></div>
                    ))}
                  </div>
                  <div className="mono" style={{ fontSize: 10.5, color: COLORS[s], letterSpacing: "0.1em", marginTop: 6, textTransform: "uppercase" }}>{LABELS[s]}</div>
                </>
              )}
            </label>
            <label>
              <div className="eyebrow" style={{ marginBottom: 6 }}>Confirm new password</div>
              <input className="input" type="password" value={pw2} onChange={e => setPw2(e.target.value)} placeholder="Re-enter password" minLength={12} required />
              {pw2 && (
                <div className="mono" style={{ fontSize: 10.5, color: match ? "var(--green)" : "#ff8888", letterSpacing: "0.1em", marginTop: 6, textTransform: "uppercase" }}>
                  {match ? "✓ Passwords match" : "✕ Passwords don't match yet"}
                </div>
              )}
            </label>
            <button type="submit" disabled={!valid} className="btn btn-iris" style={{ marginTop: 6, padding: "12px 16px", justifyContent: "center", opacity: valid ? 1 : 0.5 }}>Update password →</button>
            <div className="glass" style={{ marginTop: 6, padding: "12px 14px", borderRadius: "var(--r)", fontSize: 11.5, color: "var(--text-3)", lineHeight: 1.55, borderLeft: "2px solid var(--violet)" }}>
              <strong style={{ color: "var(--text-2)" }}>Tip:</strong> A passphrase of 4 random words is easier to remember and stronger than most short passwords.
            </div>
          </form>
        </AuthShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
