<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roadmap — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Roadmap">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    const COLS = [
      { k: "now", label: "Now", color: "var(--green)", desc: "Shipping in the next 4 weeks", items: [
        { t: "Clause-diff v2 — multi-document baseline", d: "Diff against a folder of standard templates, not just one. Severity ratings learned from your team's redline history.", votes: 234 },
        { t: "Webhooks for citation.verified", d: "Real-time event when a citation passes our grounding eval. Useful for compliance pipelines.", votes: 188 },
        { t: "Notion bidirectional sync", d: "Push chats into Notion pages and pull Notion pages back as PDFs.", votes: 142 },
      ]},
      { k: "next", label: "Next", color: "var(--blue)", desc: "Q3-Q4 2026", items: [
        { t: "Table-aware retriever", d: "Indexes financial tables structurally instead of as flowed text. Eliminates ~70% of table-Q&A errors.", votes: 412 },
        { t: "Comment threads on citations", d: "Multi-player annotation — leave comments on cited paragraphs, @-mention teammates.", votes: 326 },
        { t: "Anki + Quizlet export · 2-way sync", d: "Push flashcards to your study app and sync back updates.", votes: 198 },
        { t: "Audit logs for Practice plan", d: "Audit logs were Chamber-only; bringing baseline logs to Practice.", votes: 165 },
      ]},
      { k: "later", label: "Later", color: "var(--violet-2)", desc: "2026 H2 — early 2027", items: [
        { t: "Mobile apps (iOS + Android)", d: "Native readers with offline-capable highlighted-citation viewer.", votes: 891 },
        { t: "Browser extension", d: "Right-click any PDF in your browser → open in workspace.", votes: 567 },
        { t: "Internationalization · UI in 12 languages", d: "Currently English-only UI; expanding to Spanish, French, German, Japanese, Portuguese, Hindi, Korean, Mandarin, Italian, Dutch, Polish, Arabic.", votes: 433 },
        { t: "Custom prompt templates per workspace", d: "Save and share team-wide prompt templates for common workflows.", votes: 287 },
      ]},
      { k: "considering", label: "Considering", color: "var(--text-3)", desc: "Looking for signal", items: [
        { t: "PowerPoint chat", d: "Same workflow, but for PPTX. Tell us if you'd use it.", votes: 124 },
        { t: "Voice mode", d: "Listen to summaries while commuting. Ask questions out loud.", votes: 89 },
        { t: "Self-hosted on-prem deployment", d: "For customers with strict air-gap requirements. Enterprise-only.", votes: 156 },
      ]},
    ];

    function App() {
      return (
        <PageShell active="roadmap">
          <PageHeader eyebrow="Public roadmap" title={<>What we're <span className="iris">working on next.</span></>} lede="Updated every two weeks. Vote on what you'd use. We read every comment." />
          <section style={{ padding: "0 0 80px" }}>
            <div className="spread">
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }} className="rm-grid">
                {COLS.map(col => (
                  <div key={col.k}>
                    <div className="glass" style={{ padding: "14px 16px", borderRadius: "var(--r-lg)", marginBottom: 12, borderTop: `2px solid ${col.color}` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 8, height: 8, borderRadius: "50%", background: col.color, boxShadow: `0 0 8px ${col.color}` }}></div>
                        <div style={{ fontWeight: 700, fontSize: 13 }}>{col.label}</div>
                        <div className="mono" style={{ marginLeft: "auto", fontSize: 10.5, color: "var(--text-3)", letterSpacing: "0.08em" }}>{col.items.length}</div>
                      </div>
                      <div style={{ fontSize: 11.5, color: "var(--text-3)", marginTop: 4 }}>{col.desc}</div>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      {col.items.map((it, i) => (
                        <RoadmapCard key={i} it={it} color={col.color} />
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <style>{`
                @media (max-width: 1080px) { .rm-grid { grid-template-columns: repeat(2, 1fr) !important; } }
                @media (max-width: 600px) { .rm-grid { grid-template-columns: 1fr !important; } }
              `}</style>

              <div className="glass glass-iris-border" style={{ marginTop: 36, padding: "28px 32px", borderRadius: "var(--r-xl)", textAlign: "center" }}>
                <h3 style={{ fontSize: 22, fontWeight: 600, margin: "0 0 8px", letterSpacing: "-0.02em" }}>Have a feature request?</h3>
                <p style={{ fontSize: 13.5, color: "var(--text-3)", margin: "0 0 18px" }}>Email us. We read every request and add the popular ones here.</p>
                <a href="mailto:feedback@chatwithpdfai.com" className="btn btn-iris">feedback@chatwithpdfai.com</a>
              </div>
            </div>
          </section>
        </PageShell>
      );
    }

    function RoadmapCard({ it, color }) {
      const [v, setV] = React.useState(it.votes);
      const [voted, setVoted] = React.useState(false);
      const vote = () => {
        if (voted) { setV(v - 1); setVoted(false); }
        else { setV(v + 1); setVoted(true); window.cwpaToast?.({ kind: "success", title: "Voted!", body: "Thanks — we read these." }); }
      };
      return (
        <div className="glass hover-glow" style={{ padding: "16px 18px", borderRadius: "var(--r-lg)" }}>
          <h4 style={{ fontSize: 13.5, fontWeight: 600, margin: "0 0 6px", lineHeight: 1.3 }}>{it.t}</h4>
          <p style={{ fontSize: 12.5, color: "var(--text-3)", margin: "0 0 12px", lineHeight: 1.5 }}>{it.d}</p>
          <button onClick={vote} className={voted ? "btn btn-iris btn-sm" : "btn btn-glass btn-sm"} style={{ width: "100%", justifyContent: "center", gap: 6, padding: "6px 10px" }}>
            <span>▲</span><span className="mono" style={{ letterSpacing: "0.06em" }}>{v}</span>
          </button>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
