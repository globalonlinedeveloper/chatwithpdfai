<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Invoice INV-04827 — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: #fff !important; color: #000 !important; }
      .aurora-bg { display: none !important; }
      .glass { background: #fff !important; border-color: #ddd !important; color: #000 !important; box-shadow: none !important; }
      .iris, .iris * { -webkit-text-fill-color: #050614 !important; color: #050614 !important; background: none !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Invoice detail">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    const INV = {
      number: "INV-04827",
      status: "Paid",
      date: "May 12, 2026",
      dueDate: "May 12, 2026",
      paidDate: "May 12, 2026",
      method: "VISA •••• 4242",
      txn: "ch_3Q7vK2eZv1...",
      bill: { name: "Arkham Capital Management", contact: "Maya Khan", email: "maya@arkhamcapital.com", address: "200 West St · New York, NY 10282 · United States", vat: "—" },
      lines: [
        { desc: "Practice credit pack", detail: "400 documents · 3 seats · no expiry", qty: 1, unit: 29, total: 29 },
      ],
      sub: 29, tax: 2.54, total: 31.54,
    };
    function App() {
      return (
        <PageShell minimalFooter>
          <section style={{ padding: "40px 0 80px" }}>
            <div className="spread" style={{ maxWidth: 880 }}>
              <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 22, flexWrap: "wrap", gap: 12 }}>
                <a href="account.html" className="btn btn-glass btn-sm">← Billing & receipts</a>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => window.print()} className="btn btn-glass">↓ Save as PDF</button>
                  <button onClick={() => { navigator.clipboard?.writeText(location.href); window.cwpaToast?.({ kind: "success", title: "Invoice link copied" }); }} className="btn btn-glass">↗ Share link</button>
                  <a href="contact.html" className="btn btn-iris">Question?</a>
                </div>
              </div>

              <div className="glass" style={{ padding: "40px 44px", borderRadius: "var(--r-xl)", boxShadow: "var(--shadow-card)" }}>
                {/* Header */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 18, marginBottom: 36, paddingBottom: 28, borderBottom: "1px solid var(--stroke-1)" }}>
                  <div>
                    <a href="landing.html" className="brand" style={{ fontSize: 16 }}>
                      <span className="brand-mark" style={{ width: 24, height: 24, fontSize: 12 }}>◇</span>
                      chatwithpdfai<span className="domain">.com</span>
                    </a>
                    <p style={{ margin: "10px 0 0", fontSize: 12, color: "var(--text-3)", lineHeight: 1.5 }}>
                      CHATWITHPDFAI, Inc.<br/>548 Market St #84219 · San Francisco, CA 94104<br/>EIN: 88-1234567
                    </p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div className="mono" style={{ fontSize: 11, color: "var(--text-3)", letterSpacing: "0.14em", marginBottom: 4 }}>INVOICE</div>
                    <h1 style={{ fontSize: 28, fontWeight: 600, margin: "0 0 8px", letterSpacing: "-0.015em" }} className="iris">{INV.number}</h1>
                    <span className="pill" style={{ padding: "4px 10px", fontSize: 10.5, color: "var(--green)", border: "1px solid rgba(126,255,157,0.4)", background: "rgba(126,255,157,0.12)" }}>● {INV.status.toUpperCase()}</span>
                  </div>
                </div>

                {/* Meta */}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 32, marginBottom: 36 }} className="inv-meta">
                  <div>
                    <div className="eyebrow" style={{ marginBottom: 10 }}>Billed to</div>
                    <p style={{ margin: 0, fontSize: 14, lineHeight: 1.55 }}>
                      <strong style={{ color: "var(--text)" }}>{INV.bill.name}</strong><br/>
                      <span style={{ color: "var(--text-2)" }}>{INV.bill.contact}</span><br/>
                      <span style={{ color: "var(--text-3)" }}>{INV.bill.email}</span><br/>
                      <span style={{ color: "var(--text-3)" }}>{INV.bill.address}</span>
                    </p>
                  </div>
                  <div>
                    <div className="eyebrow" style={{ marginBottom: 10 }}>Details</div>
                    <table style={{ fontSize: 13, width: "100%", borderCollapse: "collapse" }}>
                      <tbody>
                        <tr><td style={{ padding: "4px 0", color: "var(--text-3)" }}>Invoice date</td><td style={{ padding: "4px 0", textAlign: "right", color: "var(--text)" }} className="mono">{INV.date}</td></tr>
                        <tr><td style={{ padding: "4px 0", color: "var(--text-3)" }}>Paid on</td><td style={{ padding: "4px 0", textAlign: "right", color: "var(--text)" }} className="mono">{INV.paidDate}</td></tr>
                        <tr><td style={{ padding: "4px 0", color: "var(--text-3)" }}>Payment method</td><td style={{ padding: "4px 0", textAlign: "right", color: "var(--text)" }} className="mono">{INV.method}</td></tr>
                        <tr><td style={{ padding: "4px 0", color: "var(--text-3)" }}>Transaction</td><td style={{ padding: "4px 0", textAlign: "right", color: "var(--text)" }} className="mono" style={{ fontSize: 11 }}>{INV.txn}</td></tr>
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Lines */}
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13.5, marginBottom: 22 }}>
                  <thead>
                    <tr style={{ borderBottom: "1px solid var(--stroke-2)" }}>
                      <th style={{ textAlign: "left", padding: "10px 8px", fontFamily: "var(--mono)", fontSize: 10.5, letterSpacing: "0.1em", color: "var(--text-3)", textTransform: "uppercase", fontWeight: 500 }}>Description</th>
                      <th style={{ textAlign: "right", padding: "10px 8px", fontFamily: "var(--mono)", fontSize: 10.5, letterSpacing: "0.1em", color: "var(--text-3)", textTransform: "uppercase", fontWeight: 500, width: 60 }}>Qty</th>
                      <th style={{ textAlign: "right", padding: "10px 8px", fontFamily: "var(--mono)", fontSize: 10.5, letterSpacing: "0.1em", color: "var(--text-3)", textTransform: "uppercase", fontWeight: 500, width: 100 }}>Unit</th>
                      <th style={{ textAlign: "right", padding: "10px 8px", fontFamily: "var(--mono)", fontSize: 10.5, letterSpacing: "0.1em", color: "var(--text-3)", textTransform: "uppercase", fontWeight: 500, width: 100 }}>Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    {INV.lines.map((l, i) => (
                      <tr key={i} style={{ borderBottom: "1px solid var(--stroke-1)" }}>
                        <td style={{ padding: "16px 8px", color: "var(--text)" }}>
                          <div style={{ fontWeight: 600 }}>{l.desc}</div>
                          <div style={{ fontSize: 12, color: "var(--text-3)", marginTop: 3 }}>{l.detail}</div>
                        </td>
                        <td style={{ padding: "16px 8px", textAlign: "right", fontFamily: "var(--mono)", color: "var(--text-2)" }}>{l.qty}</td>
                        <td style={{ padding: "16px 8px", textAlign: "right", fontFamily: "var(--mono)", color: "var(--text-2)" }}>${l.unit.toFixed(2)}</td>
                        <td style={{ padding: "16px 8px", textAlign: "right", fontFamily: "var(--mono)", color: "var(--text)", fontWeight: 600 }}>${l.total.toFixed(2)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>

                {/* Totals */}
                <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 18 }}>
                  <div style={{ width: 280 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 8px", fontSize: 13, color: "var(--text-3)" }}><span>Subtotal</span><span className="mono">${INV.sub.toFixed(2)}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 8px", fontSize: 13, color: "var(--text-3)" }}><span>Sales tax · CA · 8.75%</span><span className="mono">${INV.tax.toFixed(2)}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 8px", marginTop: 4, fontSize: 16, fontWeight: 600, color: "var(--text)", borderTop: "1px solid var(--stroke-2)" }}>
                      <span>Total paid</span><span className="iris mono" style={{ fontSize: 22, fontWeight: 600 }}>${INV.total.toFixed(2)}</span>
                    </div>
                  </div>
                </div>

                {/* Footer */}
                <div style={{ marginTop: 26, paddingTop: 22, borderTop: "1px solid var(--stroke-1)", display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 14, fontSize: 11.5, color: "var(--text-3)" }}>
                  <div>
                    <strong style={{ color: "var(--text-2)" }}>Thank you for using CHATWITHPDFAI.</strong><br/>
                    Refundable on unused credits within 30 days.
                  </div>
                  <div style={{ textAlign: "right" }} className="mono" style={{ letterSpacing: "0.06em", textAlign: "right" }}>
                    support@chatwithpdfai.com<br/>chatwithpdfai.com/legal/terms
                  </div>
                </div>
              </div>
              <style>{`@media (max-width: 720px) { .inv-meta { grid-template-columns: 1fr !important; } }`}</style>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
