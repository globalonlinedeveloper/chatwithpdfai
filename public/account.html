<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><meta name="robots" content="noindex,nofollow"/><title>Account · CHATWITHPDFAI</title><style>:root{--ink:#15192b;--muted:#5b637d;--line:#e4e7f0;--brand:#3b5bdb;--ok:#0f9d58;--bad:#d23f3f;--bg:#f7f8fc}*{box-sizing:border-box}body{margin:0;font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}.wrap{max-width:420px;margin:0 auto;padding:56px 20px}h1{font-size:24px;margin:0 0 4px}.sub{color:var(--muted);margin:0 0 22px;font-size:14px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px}label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}input{width:100%;font:inherit;border:1px solid var(--line);border-radius:10px;padding:10px 12px}button{width:100%;margin-top:18px;font:inherit;font-weight:600;color:#fff;background:var(--brand);border:0;border-radius:10px;padding:12px;cursor:pointer}button:disabled{opacity:.5}.status{margin-top:12px;font-size:14px;min-height:18px}.status.bad{color:var(--bad)}.alt{margin-top:16px;font-size:14px;color:var(--muted);text-align:center}a{color:var(--brand)}</style></head>
<body><div class="wrap"><h1>Your account</h1><p class="sub">Internal (feature-flagged).</p>
<div class="card">
<div>Signed in as <strong data-testid="account-email">…</strong></div>
<div class="status" data-testid="account-name" style="color:var(--muted)"></div>
<p style="margin-top:16px"><a href="/library.html">Go to your library →</a></p>
<button type="button" data-testid="signout-btn">Sign out</button>
</div></div>
<script>
(function(){var em=document.querySelector('[data-testid="account-email"]'),nm=document.querySelector('[data-testid="account-name"]'),so=document.querySelector('[data-testid="signout-btn"]');
fetch('/api/auth/me').then(function(r){if(!r.ok){location.href='/signin.html';return null;}return r.json();}).then(function(j){if(j&&j.user){em.textContent=j.user.email;nm.textContent=j.user.name||'';}}).catch(function(){location.href='/signin.html';});
so.addEventListener('click',function(){so.disabled=true;fetch('/api/auth/signout',{method:'POST'}).then(function(){location.href='/signin.html';}).catch(function(){location.href='/signin.html';});});})();
</script></body></html>
