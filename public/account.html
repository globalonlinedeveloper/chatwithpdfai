<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><meta name="robots" content="noindex,nofollow"/><title>Account · CHATWITHPDFAI</title>
<style>:root{--ink:#15192b;--muted:#5b637d;--line:#e4e7f0;--brand:#3b5bdb;--bad:#d23f3f;--bg:#f7f8fc}*{box-sizing:border-box}body{margin:0;font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}.wrap{max-width:480px;margin:0 auto;padding:48px 20px}h1{font-size:24px;margin:0 0 4px}.sub{color:var(--muted);margin:0 0 22px;font-size:14px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:14px}.bal{font-size:32px;font-weight:700}.muted{color:var(--muted);font-size:14px}button{margin-top:8px;font:inherit;font-weight:600;color:#fff;background:var(--brand);border:0;border-radius:10px;padding:11px 18px;cursor:pointer}a{color:var(--brand)}</style></head>
<body><div class="wrap"><h1>Your account</h1><p class="sub">Internal (feature-flagged).</p>
<div class="card">Signed in as <strong data-testid="account-email">…</strong><div class="muted" data-testid="account-name"></div></div>
<div class="card"><div class="muted">Credit balance</div><div class="bal" data-testid="credit-balance">…</div><div class="muted" data-testid="credit-note"></div><p style="margin-top:12px"><a href="/pricing">Buy more credits →</a></p></div>
<div class="card"><p style="margin:0 0 12px"><a href="/library.html">Go to your library →</a></p><button type="button" data-testid="signout-btn">Sign out</button></div>
</div>
<script>
(function(){var em=document.querySelector('[data-testid="account-email"]'),nm=document.querySelector('[data-testid="account-name"]'),bal=document.querySelector('[data-testid="credit-balance"]'),note=document.querySelector('[data-testid="credit-note"]'),so=document.querySelector('[data-testid="signout-btn"]');
fetch('/api/auth/me').then(function(r){if(!r.ok){location.href='/signin.html';return null;}return r.json();}).then(function(j){if(j&&j.user){em.textContent=j.user.email;nm.textContent=j.user.name||'';}}).catch(function(){location.href='/signin.html';});
fetch('/api/credits').then(function(r){return r.ok?r.json():null;}).then(function(j){if(j){bal.textContent=j.balance+' credits';note.textContent=j.enforced?'':'(enforcement off until launch)';}}).catch(function(){});
so.addEventListener('click',function(){so.disabled=true;fetch('/api/auth/signout',{method:'POST'}).then(function(){location.href='/signin.html';}).catch(function(){location.href='/signin.html';});});})();
</script></body></html>
