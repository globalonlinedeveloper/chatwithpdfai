ne click","**EU residency option** — Mayo's European partner sites elect this for GDPR compliance","**Audit logs** — every access to a patient document is logged for HIPAA"]}]},{"h2":"Beyond consent","body":["Mayo's team has expanded usage to clinical trial protocol summaries, medication instruction sheets, and translated discharge instructions. The same trust model — translated for the patient, verbatim for the clinician — applies to all of them."]}],"related":[{"title":"Latham & Watkins · MSA redlines","tag":"Customer story","href":"latham.html"},{"title":"Arkham Capital · 11-min memos","tag":"Customer story","href":"arkham.html"},{"title":"For healthcare","tag":"Use case","href":"../use-cases/healthcare.html"}]};
