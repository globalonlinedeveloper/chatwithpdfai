    const PAGE = {"meta":{"title":"Arkham Capital · 11-minute earnings memo","category":"Customer story","date":"Apr 17, 2026","readTime":"7 min read","lede":"Maya Khan's research team turned 10-K drops into Slack memos in under 11 minutes — and never misses a footnote.","author":{"name":"Iris Chen","role":"Customer success","initials":"IC"},"backHref":"index.html","backLabel":"All customers"},"sections":[{"body":["Arkham Capital is a $4B equity research-driven hedge fund. Maya Khan covers semiconductors. Earnings season is hell."]},{"h2":"The problem","body":["NVIDIA reports earnings. The 10-Q drops at 4:01 PM. By 4:15, every other fund on the street has skimmed the headline numbers, but the alpha is in the footnotes, the table changes, and the language revisions in the MD&A.","Reading a 90-page 10-Q top to bottom takes an analyst 45 minutes minimum. By then, the move has happened.",{"quote":"The diff view across two consecutive 10-Qs is the feature I would pay alone for. It catches what humans skim past.","cite":"Maya Khan · Equity Research"}]},{"h2":"The solution","body":["Maya's team set up a Thread for each name on their coverage list. When a new filing drops, the Thread auto-ingests the document and runs a saved diff against the prior period — every line item, every footnote, every MD&A change.",{"stats":[["11 min","Filing → memo on Slack"],["100%","Footnotes surfaced"],["~30","Names covered"]]}]},{"h2":"The workflow","body":[{"ol":["A new filing is detected (SEC EDGAR webhook → API upload)","The Thread re-runs the saved diff and the saved analyst questions across the new + prior period","Output is a structured memo: headline number changes, footnote changes, MD&A language deltas, segment-level moves","Memo posts to a private Slack channel; analyst spot-checks via citations"]}]},{"h2":"Why it works for fundamental analysts","body":[{"ul":["**Footnote miner** — surfaces every quiet revision, table change, and restatement","**Multi-doc chat** — ask across the 10-K, the transcript, and the sell-side note simultaneously","**API + webhooks** — wired into their internal stack with deterministic per-doc pricing","**Calibrated refusal** — if a claim isn't in the document, we say so (not invent it)"]}]},{"h2":"Results","body":["Maya's team estimates the time savings at ~14 hours per analyst per earnings season. More valuable than the hours: catching footnote changes that drove three of their highest-conviction trades in 2026 Q1."]}],"related":[{"title":"Latham & Watkins · MSA redlines","tag":"Customer story","href":"latham.html"},{"title":"Mayo Clinic · bedside translation","tag":"Customer story","href":"mayo.html"},{"title":"For finance professionals","tag":"Use case","href":"../use-cases/finance.html"}]};
