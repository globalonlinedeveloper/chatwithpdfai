<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Upload a PDF · CHATWITHPDFAI (internal)</title>
  <style>
    :root { --ink:#15192b; --muted:#5b637d; --line:#e4e7f0; --brand:#3b5bdb; --ok:#0f9d58; --bad:#d23f3f; --bg:#f7f8fc; }
    * { box-sizing: border-box; }
    body { margin:0; font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink); background:var(--bg); }
    .wrap { max-width:720px; margin:0 auto; padding:48px 20px; }
    h1 { font-size:24px; margin:0 0 4px; }
    .sub { color:var(--muted); margin:0 0 28px; font-size:14px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:24px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    input[type=file] { font:inherit; }
    button { font:inherit; font-weight:600; color:#fff; background:var(--brand); border:0; border-radius:10px; padding:10px 18px; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .status { margin-top:18px; padding:12px 14px; border-radius:10px; background:#f0f2fa; font-size:14px; min-height:20px; }
    .status.ok { background:#e9f7ef; color:var(--ok); }
    .status.bad { background:#fdeaea; color:var(--bad); }
    .status.busy { background:#eef1fb; color:var(--brand); }
    h2 { font-size:15px; margin:28px 0 8px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; }
    .pill { font-size:12px; padding:2px 8px; border-radius:999px; background:#eef1fb; color:var(--brand); }
    .pill.ready { background:#e9f7ef; color:var(--ok); }
    .pill.failed { background:#fdeaea; color:var(--bad); }
    .empty { color:var(--muted); font-size:14px; }
    .note { margin-top:24px; color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Upload a PDF</h1>
    <p class="sub">Internal test harness for the Phase&nbsp;1 ingest pipeline (feature-flagged).</p>

    <div class="card">
      <div class="row">
        <input type="file" accept="application/pdf,.pdf" data-testid="file-input" />
        <button type="button" data-testid="upload-btn">Upload &amp; process</button>
      </div>
      <div class="status" data-testid="status" role="status" aria-live="polite">Choose a PDF to begin.</div>
    </div>

    <h2>Your documents</h2>
    <div data-testid="doc-list"><p class="empty" data-testid="doc-empty">No documents yet.</p></div>

    <p class="note">Owner is a stub user until auth lands (M5). Embeddings are mocked unless an OpenAI key is configured.</p>
  </div>

  <script>
    (function () {
      var fileInput = document.querySelector('[data-testid="file-input"]');
      var uploadBtn = document.querySelector('[data-testid="upload-btn"]');
      var statusEl  = document.querySelector('[data-testid="status"]');
      var listEl    = document.querySelector('[data-testid="doc-list"]');

      function setStatus(text, kind) {
        statusEl.textContent = text;
        statusEl.className = 'status' + (kind ? ' ' + kind : '');
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
        });
      }

      function renderList(docs) {
        if (!docs || !docs.length) {
          listEl.innerHTML = '<p class="empty" data-testid="doc-empty">No documents yet.</p>';
          return;
        }
        var rows = docs.map(function (d) {
          var cls = d.status === 'ready' ? 'ready' : (d.status === 'failed' ? 'failed' : '');
          return '<tr data-testid="doc-row">' +
            '<td>' + escapeHtml(d.filename) + '</td>' +
            '<td><span class="pill ' + cls + '" data-testid="doc-status">' + escapeHtml(d.status) + '</span></td>' +
            '<td data-testid="doc-pages">' + (d.pageCount || 0) + '</td>' +
          '</tr>';
        }).join('');
        listEl.innerHTML = '<table><thead><tr><th>File</th><th>Status</th><th>Pages</th></tr></thead><tbody>' + rows + '</tbody></table>';
      }

      function refreshList() {
        return fetch('/api/documents')
          .then(function (r) { return r.ok ? r.json() : { documents: [] }; })
          .then(function (j) { renderList(j.documents); })
          .catch(function () {});
      }

      uploadBtn.addEventListener('click', function () {
        var file = fileInput.files && fileInput.files[0];
        if (!file) { setStatus('Please choose a PDF file first.', 'bad'); return; }

        var fd = new FormData();
        fd.append('file', file);

        uploadBtn.disabled = true;
        setStatus('Uploading and processing…', 'busy');

        fetch('/api/documents/upload', { method: 'POST', body: fd })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
          .then(function (res) {
            if (!res.ok) {
              setStatus('Error: ' + (res.body.error || 'upload failed'), 'bad');
              return;
            }
            var d = res.body.document;
            setStatus('Ready — ' + d.pageCount + ' page' + (d.pageCount === 1 ? '' : 's') +
              ' processed (' + d.embeddedPages + ' embedded' +
              (d.mockedEmbeddings ? ', mocked' : '') + ').', 'ok');
            return refreshList();
          })
          .catch(function (e) { setStatus('Error: ' + e.message, 'bad'); })
          .finally(function () { uploadBtn.disabled = false; });
      });

      refreshList();
    })();
  </script>
</body>
</html>
