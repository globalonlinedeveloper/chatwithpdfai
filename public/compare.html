<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compare documents — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Compare documents">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const DIFFS = [
      { id: "ind", clause: "§ 12. Indemnification", sev: "material", a: { v: "Capped at **1× annual fees** with no carve-outs", page: 31 }, b: { v: "Capped at **2× annual fees** with carve-outs for IP infringement, breach of confidentiality, and gross negligence", page: 47 }, summary: "Counterparty's cap is 2× higher than our template. Carve-outs are new and broader. **Recommend negotiating cap back down to 1×; accept IP carve-out.**" },
      { id: "term", clause: "§ 14. Term & Termination", sev: "material", a: { v: "Initial term of **2 years**, with 60-day non-renewal notice", page: 34 }, b: { v: "Initial term of **3 years**, with 90-day non-renewal notice and auto-renewal", page: 51 }, summary: "Longer term + auto-renewal + longer notice window favors the counterparty. **Recommend reducing term to 2 years and removing auto-renewal.**" },
      { id: "law", clause: "§ 19. Governing Law", sev: "moderate", a: { v: "**New York** law, with venue in the Southern District of New York", page: 38 }, b: { v: "**Delaware** law, with exclusive jurisdiction in Wilmington", page: 88 }, summary: "Forum has been shifted from NY to Delaware. Delaware is acceptable for tech contracts. **Likely accept.**" },
      { id: "cure", clause: "§ 14.2 Cure period", sev: "minor", a: { v: "**14-day** cure period for material breach", page: 35 }, b: { v: "**30-day** cure period for material breach", page: 51 }, summary: "Longer cure period gives counterparty more room. **Negotiate to 21 days as a compromise.**" },
      { id: "audit", clause: "§ 17. Audit rights", sev: "new", a: { v: "**Not present**", page: null }, b: { v: "Customer gets annual audit right with 30 days notice", page: 72 }, summary: "Audit right is new and runs in counterparty's favor only. **Add reciprocal audit right.**" },
      { id: "publicity", clause: "§ 21. Publicity", sev: "minor", a: { v: "Either party may issue press release", page: 41 }, b: { v: "Press releases require **mutual written consent**", page: 92 }, summary: "More restrictive but standard. **Accept.**" },
    ];

    const SEV = {
      material: { color: "#ff7e7e", label: "Material" },
      moderate: { color: "#ffbd2e", label: "Moderate" },
      minor: { color: "var(--violet-2)", label: "Minor" },
      new: { color: "var(--green)", label: "New clause" },
    };

    function App() {
      const [active, setActive] = useState("ind");
      const [view, setView] = useState("split"); // split | unified
      const a = DIFFS.find(d => d.id === active);
      const counts = { material: 2, moderate: 1, minor: 2, new: 1 };

      return (
        <PageShell>
          <section style={{ padding: "30px 0 80px" }}>
            <div className="spread">
              {/* Header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 16, marginBottom: 22 }}>
                <div>
                  <a href="library.html" className="btn btn-glass btn-sm" style={{ marginBottom: 12 }}>← Library</a>
                  <h1 style={{ fontSize: 28, fontWeight: 600, letterSpacing: "-0.02em", margin: 0 }}>Clause-by-clause diff</h1>
                  <p style={{ fontSize: 13, color: "var(--text-3)", margin: "6px 0 0" }}>6 differences found · 2 material · 1 moderate · 2 minor · 1 new clause</p>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <div className="glass" style={{ padding: 3, borderRadius: "var(--r-pill)", display: "flex" }}>
                    <button onClick={() => setView("split")} className={view === "split" ? "btn btn-iris btn-sm" : "btn btn-ghost btn-sm"} style={{ borderRadius: "var(--r-pill)" }}>Side-by-side</button>
                    <button onClick={() => setView("unified")} className={view === "unified" ? "btn btn-iris btn-sm" : "btn btn-ghost btn-sm"} style={{ borderRadius: "var(--r-pill)" }}>Unified</button>
                  </div>
                  <button className="btn btn-glass btn-sm">↓ Export memo</button>
                  <button className="btn btn-iris btn-sm">Open in workspace →</button>
                </div>
              </div>

              {/* Document labels */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 18 }} className="docs-row">
                <div className="glass" style={{ padding: "16px 20px", borderRadius: "var(--r-lg)", display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 38, height: 48, background: "rgba(255,255,255,0.04)", border: "1px solid var(--stroke-2)", borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center" }}><span className="mono" style={{ fontSize: 9, color: "var(--text-3)", letterSpacing: "0.1em" }}>A</span></div>
                  <div style={{ flex: 1 }}>
                    <div className="mono" style={{ fontSize: 10, color: "var(--text-3)", letterSpacing: "0.1em" }}>DOCUMENT A · TEMPLATE</div>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>MSA Template — Firm Standard.pdf</div>
                    <div style={{ fontSize: 11.5, color: "var(--text-3)" }}>198 pp · v4.2 · Last revised Jan 2026</div>
                  </div>
                </div>
                <div className="glass" style={{ padding: "16px 20px", borderRadius: "var(--r-lg)", display: "flex", alignItems: "center", gap: 12, border: "1px solid var(--stroke-3)" }}>
                  <div style={{ width: 38, height: 48, background: "rgba(183,106,255,0.1)", border: "1px solid var(--violet)", borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center" }}><span className="mono" style={{ fontSize: 9, color: "var(--violet-2)", letterSpacing: "0.1em" }}>B</span></div>
                  <div style={{ flex: 1 }}>
                    <div className="mono" style={{ fontSize: 10, color: "var(--violet-2)", letterSpacing: "0.1em" }}>DOCUMENT B · INCOMING</div>
                    <div style={{ fontSize: 14, fontWeight: 600 }}>MSA — Acme ↔ Helix Labs.pdf</div>
                    <div style={{ fontSize: 11.5, color: "var(--text-3)" }}>213 pp · Received May 12, 2026</div>
                  </div>
                </div>
              </div>

              {/* Body */}
              <div style={{ display: "grid", gridTemplateColumns: "260px 1fr", gap: 18, alignItems: "start" }} className="compare-grid">
                {/* Sidebar */}
                <aside className="glass" style={{ padding: 12, borderRadius: "var(--r-lg)", position: "sticky", top: 90 }}>
                  <div className="eyebrow" style={{ padding: "4px 8px 10px" }}>Differences ({DIFFS.length})</div>
                  {DIFFS.map(d => {
                    const sev = SEV[d.sev];
                    return (
                      <button key={d.id} onClick={() => setActive(d.id)} style={{ display: "block", width: "100%", textAlign: "left", padding: "10px 12px", borderRadius: 6, background: active === d.id ? "var(--glass-2)" : "transparent", border: "none", borderLeft: `2px solid ${active === d.id ? sev.color : "transparent"}`, color: active === d.id ? "var(--text)" : "var(--text-3)", fontFamily: "var(--sans)", cursor: "pointer", marginBottom: 3 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ width: 6, height: 6, borderRadius: "50%", background: sev.color, flexShrink: 0 }}></span>
                          <span style={{ fontSize: 12.5, fontWeight: active === d.id ? 500 : 400, lineHeight: 1.25 }}>{d.clause}</span>
                        </div>
                        <div className="mono" style={{ fontSize: 9.5, color: sev.color, letterSpacing: "0.1em", marginTop: 4, marginLeft: 14, textTransform: "uppercase" }}>{sev.label}</div>
                      </button>
                    );
                  })}
                  <div style={{ marginTop: 14, padding: "12px 14px", background: "rgba(255,126,126,0.08)", border: "1px solid rgba(255,126,126,0.25)", borderRadius: 6 }}>
                    <div className="mono" style={{ fontSize: 10, color: "#ff8888", letterSpacing: "0.1em", marginBottom: 4 }}>● PRIORITY · 2 MATERIAL</div>
                    <div style={{ fontSize: 11.5, color: "var(--text-2)", lineHeight: 1.5 }}>Recommend negotiating both before signing.</div>
                  </div>
                </aside>

                {/* Detail */}
                <div>
                  <div style={{ marginBottom: 18, display: "flex", alignItems: "center", gap: 12 }}>
                    <h2 style={{ fontSize: 22, fontWeight: 600, margin: 0, letterSpacing: "-0.015em" }}>{a.clause}</h2>
                    <span className="pill" style={{ padding: "3px 10px", fontSize: 10.5, background: `${SEV[a.sev].color}22`, border: `1px solid ${SEV[a.sev].color}`, color: SEV[a.sev].color }}>{SEV[a.sev].label.toUpperCase()}</span>
                  </div>

                  {view === "split" ? (
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }} className="diff-row">
                      <DiffSide label="DOCUMENT A · TEMPLATE" v={a.a.v} page={a.a.page} side="a" />
                      <DiffSide label="DOCUMENT B · INCOMING" v={a.b.v} page={a.b.page} side="b" />
                    </div>
                  ) : (
                    <div className="glass" style={{ padding: "20px 22px", borderRadius: "var(--r-lg)" }}>
                      <div style={{ paddingBottom: 12, marginBottom: 12, borderBottom: "1px solid var(--stroke-1)" }}>
                        <div className="mono" style={{ fontSize: 10, color: "#ff8888", letterSpacing: "0.1em", marginBottom: 6 }}>− DOCUMENT A {a.a.page ? `· p.${a.a.page}` : ""}</div>
                        <div style={{ fontSize: 14, color: "var(--text-2)", textDecoration: "line-through", textDecorationColor: "rgba(255,126,126,0.5)", lineHeight: 1.6 }} dangerouslySetInnerHTML={{ __html: a.a.v.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text);font-weight:600">$1</strong>') }}></div>
                      </div>
                      <div>
                        <div className="mono" style={{ fontSize: 10, color: "var(--green)", letterSpacing: "0.1em", marginBottom: 6 }}>+ DOCUMENT B {a.b.page ? `· p.${a.b.page}` : ""}</div>
                        <div style={{ fontSize: 14, color: "var(--text)", lineHeight: 1.6 }} dangerouslySetInnerHTML={{ __html: a.b.v.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text);font-weight:600">$1</strong>') }}></div>
                      </div>
                    </div>
                  )}

                  {/* AI recommendation */}
                  <div className="glass" style={{ marginTop: 14, padding: "20px 22px", borderRadius: "var(--r-lg)", borderLeft: "3px solid var(--violet)" }}>
                    <div className="eyebrow" style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ width: 18, height: 18, borderRadius: "50%", background: "var(--grad-iris-2)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: "#fff" }}>AI</span>
                      ASSISTANT RECOMMENDATION
                    </div>
                    <p style={{ fontSize: 14, lineHeight: 1.6, margin: 0, color: "var(--text)" }} dangerouslySetInnerHTML={{ __html: a.summary.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text);font-weight:600">$1</strong>') }}></p>
                    <div style={{ marginTop: 14, display: "flex", gap: 6, flexWrap: "wrap" }}>
                      <button className="chip" style={{ fontSize: 11.5 }}>✓ Accept</button>
                      <button className="chip" style={{ fontSize: 11.5 }}>Negotiate</button>
                      <button className="chip" style={{ fontSize: 11.5 }}>Reject</button>
                      <button className="chip" style={{ fontSize: 11.5 }}>Add to memo</button>
                      <button className="chip" style={{ fontSize: 11.5 }}>Flag for partner</button>
                    </div>
                  </div>

                  {/* Stats footer */}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginTop: 18 }} className="diff-stats">
                    {Object.entries(counts).map(([k, v]) => {
                      const s = SEV[k];
                      return (
                        <div key={k} className="glass" style={{ padding: "14px 16px", borderRadius: "var(--r)", borderTop: `2px solid ${s.color}` }}>
                          <div style={{ fontSize: 24, fontWeight: 600, color: s.color, lineHeight: 1 }}>{v}</div>
                          <div className="mono" style={{ fontSize: 9.5, color: "var(--text-3)", letterSpacing: "0.1em", marginTop: 6, textTransform: "uppercase" }}>{s.label}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
              <style>{`
                @media (max-width: 880px) { .compare-grid { grid-template-columns: 1fr !important; } .docs-row, .diff-row { grid-template-columns: 1fr !important; } }
                @media (max-width: 560px) { .diff-stats { grid-template-columns: repeat(2, 1fr) !important; } }
              `}</style>
            </div>
          </section>
        </PageShell>
      );
    }

    function DiffSide({ label, v, page, side }) {
      return (
        <div className="glass" style={{ padding: "16px 20px", borderRadius: "var(--r-lg)", borderTop: `2px solid ${side === "a" ? "var(--stroke-3)" : "var(--violet)"}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div className="mono" style={{ fontSize: 10, color: side === "a" ? "var(--text-3)" : "var(--violet-2)", letterSpacing: "0.1em" }}>{label}</div>
            {page && <div className="mono" style={{ fontSize: 10, color: "var(--text-3)" }}>p.{page}</div>}
          </div>
          <div style={{ fontSize: 14, color: "var(--text)", lineHeight: 1.6 }} dangerouslySetInnerHTML={{ __html: v.replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text);font-weight:600">$1</strong>') }}></div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
