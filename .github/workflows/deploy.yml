name: Deploy (trigger Hostinger redeploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Hostinger deploy webhook
        env:
          WEBHOOK: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::error::HOSTINGER_DEPLOY_WEBHOOK secret is not set. Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "Triggering Hostinger redeploy for ${GITHUB_SHA:0:7} ..."
          code=$(curl -sS -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "X-GitHub-Event: push" \
            --data "ref=refs/heads/main&after=${GITHUB_SHA}" \
            -o resp.txt -w "%{http_code}" --max-time 30 "$WEBHOOK")
          echo "Webhook responded HTTP $code"
          head -c 600 resp.txt 2>/dev/null || true; echo
          case "$code" in
            2*) echo "Deploy triggered successfully." ;;
            *) echo "::error::Webhook returned HTTP $code"; exit 1 ;;
          esac
