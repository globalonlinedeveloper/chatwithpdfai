<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Webhook logs — CHATWITHPDFAI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="a11y.css" />
  <link rel="stylesheet" href="prose.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Webhook logs">
  <a class="skip-link" href="#root">Skip to content</a>
  <div class="aurora-bg"></div>
  <div id="root"></div>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const EVENTS = [
      { id: "evt_8z2k1a", type: "document.ready", status: "ok", code: 200, when: "2 min ago", retries: 0, endpoint: "https://hooks.arkham.dev/cwpa", duration: 142 },
      { id: "evt_7yj3b9", type: "citation.verified", status: "ok", code: 200, when: "12 min ago", retries: 0, endpoint: "https://hooks.arkham.dev/cwpa", duration: 89 },
      { id: "evt_6xh4c7", type: "summary.ready", status: "ok", code: 200, when: "18 min ago", retries: 0, endpoint: "https://hooks.arkham.dev/cwpa", duration: 117 },
      { id: "evt_5wg5d6", type: "credits.low", status: "retry", code: 500, when: "1 hr ago", retries: 2, endpoint: "https://hooks.arkham.dev/cwpa", duration: 30000 },
      { id: "evt_4vf6e5", type: "document.ready", status: "fail", code: 404, when: "3 hr ago", retries: 5, endpoint: "https://hooks.arkham.dev/old-endpoint", duration: 220 },
      { id: "evt_3ue7f4", type: "citation.verified", status: "ok", code: 200, when: "4 hr ago", retries: 0, endpoint: "https://hooks.arkham.dev/cwpa", duration: 102 },
      { id: "evt_2td8g3", type: "summary.ready", status: "ok", code: 200, when: "5 hr ago", retries: 0, endpoint: "https://hooks.arkham.dev/cwpa", duration: 98 },
      { id: "evt_1sc9h2", type: "document.ready", status: "ok", code: 200, when: "6 hr ago", retries: 0, endpoint: "https://hooks.arkham.dev/cwpa", duration: 156 },
    ];
    const PAYLOAD = `{
  "id": "evt_8z2k1a",
  "type": "document.ready",
  "created": 1716422400,
  "data": {
    "document": {
      "id": "doc_8z2k1a",
      "name": "MSA — Acme ↔ Helix Labs.pdf",
      "pages": 213,
      "credits_used": 1,
      "summary_ready": true,
      "language": "en",
      "ocr_required": false
    },
    "workspace_id": "ws_arkham_main"
  }
}`;

    function App() {
      const [filter, setFilter] = useState("all");
      const [selected, setSelected] = useState(EVENTS[0]);
      const filtered = filter === "all" ? EVENTS : EVENTS.filter(e => e.status === filter);
      const STATUS = { ok: ["var(--green)", "Delivered"], retry: ["#ffbd2e", "Retrying"], fail: ["#ff7e7e", "Failed"] };

      return (
        <PageShell>
          <section style={{ padding: "40px 0 80px" }}>
            <div className="spread">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 16, marginBottom: 22 }}>
                <div>
                  <a href="account.html" className="btn btn-glass btn-sm" style={{ marginBottom: 12 }}>← Account</a>
                  <h1 style={{ fontSize: 28, fontWeight: 600, margin: 0, letterSpacing: "-0.02em" }}>Webhook delivery log</h1>
                  <p style={{ fontSize: 13, color: "var(--text-3)", margin: "6px 0 0" }}>Last 7 days · {EVENTS.length} events · 1 endpoint configured</p>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <a href="docs.html#webhooks" className="btn btn-glass btn-sm">↗ Docs</a>
                  <button className="btn btn-glass btn-sm">↻ Replay all failed</button>
                  <button className="btn btn-iris btn-sm">+ Add endpoint</button>
                </div>
              </div>

              {/* Health */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }} className="hook-stats">
                {[
                  ["99.4%", "Delivery rate · 7d", "var(--green)"],
                  ["112ms", "Avg latency", "var(--violet-2)"],
                  ["1", "Failed (24h)", "#ff7e7e"],
                  ["1", "Endpoints", "var(--text-2)"],
                ].map(([n, l, c]) => (
                  <div key={l} className="glass" style={{ padding: "18px 20px", borderRadius: "var(--r-lg)", borderTop: `2px solid ${c}` }}>
                    <div style={{ fontSize: 26, fontWeight: 600, color: c === "var(--text-2)" ? "var(--text)" : c, lineHeight: 1 }}>{n}</div>
                    <div className="mono" style={{ fontSize: 10, color: "var(--text-3)", letterSpacing: "0.1em", marginTop: 6, textTransform: "uppercase" }}>{l}</div>
                  </div>
                ))}
              </div>
              <style>{`@media (max-width: 760px) { .hook-stats { grid-template-columns: repeat(2, 1fr) !important; } }`}</style>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: 18, alignItems: "start" }} className="hook-grid">
                {/* Log */}
                <div>
                  <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
                    {[["all", "All"], ["ok", "OK"], ["retry", "Retrying"], ["fail", "Failed"]].map(([k, l]) => (
                      <button key={k} onClick={() => setFilter(k)} className={filter === k ? "btn btn-iris btn-sm" : "btn btn-glass btn-sm"}>{l}</button>
                    ))}
                    <div style={{ flex: 1 }}></div>
                    <input className="input" placeholder="Search by event ID…" style={{ width: 240, padding: "6px 12px", fontSize: 12 }} />
                  </div>
                  <div className="glass" style={{ borderRadius: "var(--r-lg)", overflow: "hidden" }}>
                    {filtered.map((e, i) => {
                      const [color, label] = STATUS[e.status];
                      const active = selected?.id === e.id;
                      return (
                        <button key={e.id} onClick={() => setSelected(e)} style={{ display: "grid", gridTemplateColumns: "auto 1fr auto auto", gap: 12, padding: "12px 16px", width: "100%", textAlign: "left", border: "none", borderTop: i > 0 ? "1px solid var(--stroke-1)" : "none", borderLeft: active ? "2px solid var(--violet)" : "2px solid transparent", background: active ? "var(--glass-2)" : "transparent", cursor: "pointer", alignItems: "center", color: "var(--text)", fontFamily: "var(--sans)" }}>
                          <div style={{ width: 7, height: 7, borderRadius: "50%", background: color, boxShadow: `0 0 6px ${color}` }}></div>
                          <div style={{ minWidth: 0 }}>
                            <div className="mono" style={{ fontSize: 12.5, color: "var(--text)", fontWeight: 500 }}>{e.type}</div>
                            <div className="mono" style={{ fontSize: 10, color: "var(--text-3)", letterSpacing: "0.06em", marginTop: 2 }}>{e.id} · {e.when.toUpperCase()}</div>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <div className="mono" style={{ fontSize: 11, color, fontWeight: 600, letterSpacing: "0.06em" }}>{e.code} {label.toUpperCase()}</div>
                            <div className="mono" style={{ fontSize: 10, color: "var(--text-3)", marginTop: 2 }}>{e.duration}ms · {e.retries > 0 ? `${e.retries} retries` : "1 attempt"}</div>
                          </div>
                          <span style={{ color: "var(--text-4)" }}>›</span>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Detail */}
                {selected && (
                  <aside className="glass" style={{ padding: 22, borderRadius: "var(--r-lg)", position: "sticky", top: 100 }}>
                    <div className="eyebrow" style={{ marginBottom: 10 }}>Event detail</div>
                    <h3 className="mono" style={{ fontSize: 13, fontWeight: 600, margin: "0 0 6px", color: "var(--violet-2)" }}>{selected.type}</h3>
                    <p className="mono" style={{ fontSize: 10.5, color: "var(--text-3)", margin: "0 0 18px", letterSpacing: "0.06em" }}>{selected.id}</p>

                    <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse", marginBottom: 18 }}>
                      <tbody>
                        {[
                          ["Status", <span style={{ color: STATUS[selected.status][0], fontFamily: "var(--mono)", fontWeight: 600 }}>{selected.code} {STATUS[selected.status][1].toUpperCase()}</span>],
                          ["Endpoint", <span className="mono" style={{ fontSize: 10.5, color: "var(--text-2)", wordBreak: "break-all" }}>{selected.endpoint}</span>],
                          ["Attempt", `${selected.retries + 1} of ${selected.status === "fail" ? 6 : selected.retries + 1}`],
                          ["Duration", `${selected.duration}ms`],
                          ["When", selected.when],
                        ].map(([k, v]) => (
                          <tr key={k}><td style={{ padding: "5px 0", color: "var(--text-3)", verticalAlign: "top" }}>{k}</td><td style={{ padding: "5px 0 5px 10px", textAlign: "right", color: "var(--text)" }}>{v}</td></tr>
                        ))}
                      </tbody>
                    </table>

                    <div className="eyebrow" style={{ marginBottom: 8 }}>Payload</div>
                    <pre style={{ background: "#0a0c20", border: "1px solid var(--stroke-2)", borderRadius: "var(--r)", padding: 12, fontSize: 10.5, lineHeight: 1.6, color: "#d9b6ff", fontFamily: "var(--mono)", overflowX: "auto", maxHeight: 240, margin: 0 }}>{PAYLOAD}</pre>

                    <div style={{ display: "flex", gap: 6, marginTop: 14, flexWrap: "wrap" }}>
                      <button className="btn btn-glass btn-sm" style={{ flex: 1, justifyContent: "center" }}>↻ Replay</button>
                      <button className="btn btn-glass btn-sm">📋 Copy ID</button>
                    </div>
                    {selected.status === "fail" && (
                      <div className="glass" style={{ marginTop: 14, padding: "10px 12px", borderRadius: "var(--r)", borderLeft: "2px solid #ff7e7e", fontSize: 11.5, color: "var(--text-2)" }}>
                        <strong style={{ color: "#ff8888" }}>404 Not Found</strong> — endpoint returned 404 on all 6 attempts. Update the URL or this event will be discarded after 7 days.
                      </div>
                    )}
                  </aside>
                )}
              </div>
              <style>{`@media (max-width: 960px) { .hook-grid { grid-template-columns: 1fr !important; } }`}</style>
            </div>
          </section>
        </PageShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
